name: Feature request
description: Propose a new capability or product direction.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer need is not being met?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which parts are affected?
      placeholder: protocol, runtime, network-server, observer views, docs
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, sketches, screenshots, or prior discussion.
